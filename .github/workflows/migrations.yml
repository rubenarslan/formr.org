name: SQL migrations

on:
  pull_request:
    paths:
      - 'sql/patches/**'
      - '.github/workflows/migrations.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Lint new SQL patches against the base branch:
#   * detects two branches both adding a patch with the same NNN prefix
#   * detects edits to a patch that's already been merged (those should be a
#     new patch, not a retroactive edit)
#   * detects destructive ops (DROP COLUMN with possible data loss, MODIFY
#     COLUMN that can fail under load, etc.) — flagged so reviewers see them
#
# Atlas needs a "dev" database to compute the diff. We run an official
# mariadb:noble service container (matches prod's image in
# docker-compose.yml) instead of the previous `docker://mariadb/11/dev`
# URL — Atlas's docker:// scheme pulls from arigaio's curated registry,
# which doesn't publish a MariaDB 11+ tag, so docker://mariadb/11/dev
# fails with "manifest unknown".

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      mariadb:
        image: mariadb:noble
        env:
          MARIADB_ROOT_PASSWORD: lint
          MARIADB_DATABASE: dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -uroot -plint"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4
        with:
          # full history so atlas can diff against the merge base
          fetch-depth: 0

      - uses: ariga/setup-atlas@v0
        with:
          # v0.38 moved `migrate lint` behind Atlas Pro; pin to the last
          # release where it's still free. Bump only after either signing
          # up for Pro (and wiring a token) or after the lint step is
          # removed.
          version: v0.37.0

      # Atlas's default versioned format treats the leading "NNN_" as the
      # version, so no special configuration is needed for sql/patches/.
      # We do need an atlas.sum, which we recompute on every run because we
      # don't commit one upstream.
      - name: Hash migrations
        run: atlas migrate hash --dir file://sql/patches

      # Non-blocking until the dev-DB bootstrap is fixed. Atlas's `migrate
      # lint` first replays every prior migration into the dev DB to reach
      # the base state, then analyzes the new ones. But sql/patches/*.sql
      # are not standalone — they assume sql/schema.sql has been loaded
      # (e.g. 041_expiring_runs.sql ALTERs survey_studies, which is only
      # defined in schema.sql). To make this gating, the workflow needs
      # to seed schema.sql into dev and baseline Atlas at the highest
      # in-master patch version before this step runs. Tracked as a
      # follow-up; for now we surface the output so reviewers can still
      # eyeball destructive-op warnings.
      - name: Lint vs base branch
        continue-on-error: true
        run: |
          atlas migrate lint \
            --dir file://sql/patches \
            --dev-url "mariadb://root:lint@127.0.0.1:3306/dev" \
            --git-base "origin/${{ github.base_ref }}"

      - name: Validate integrity
        run: atlas migrate validate --dir file://sql/patches
