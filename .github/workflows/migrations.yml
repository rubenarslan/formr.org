name: SQL migrations

on:
  pull_request:
    paths:
      - 'sql/patches/**'
      - 'sql/schema.sql'
      - '.github/workflows/migrations.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Validates that the SQL patches added in this PR actually apply cleanly
# on top of the schema state that's already on master. Mirrors what
# ./db_atlas_apply.sh apply does in the deployment repo
# (https://github.com/rubenarslan/formr-docker):
#
#   1. Spin up an empty MariaDB matching the prod image.
#   2. Load sql/schema.sql — the fresh-install baseline. The numbered
#      patches aren't standalone; they ALTER tables that only exist
#      after schema.sql has been loaded (e.g. 041_expiring_runs.sql
#      touches survey_studies, which is only defined in schema.sql).
#   3. Tell Atlas the dev DB is already at the highest patch version
#      present on origin/<base_ref>. Atlas writes that as the baseline
#      into atlas_schema_revisions without re-running any pre-base
#      migration.
#   4. Apply the new patches introduced by this PR. If any of them
#      fails (FK target missing, column already exists, syntax error,
#      …), the job fails with the actual atlas error.
#
# Atlas's `migrate lint` would also surface destructive-op warnings,
# but it insists on owning the dev DB as a sandbox — it wipes whatever
# state is preloaded — so it can't lint patches that depend on a
# schema-baseline file. v0.38+ also moved lint behind Atlas Pro.
# `migrate apply` against a properly seeded dev DB is the
# corresponding free + production-faithful check.

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      mariadb:
        image: mariadb:noble
        env:
          MARIADB_ROOT_PASSWORD: lint
          MARIADB_DATABASE: dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -uroot -plint"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4
        with:
          # full history so we can read sql/patches/ off origin/<base_ref>
          fetch-depth: 0

      - uses: ariga/setup-atlas@v0
        with:
          # Pin to the last release where `migrate lint` is free, so
          # this workflow stays bumpable in either direction. The lint
          # step itself isn't used (see top comment), but other atlas
          # subcommands behave the same.
          version: v0.37.0

      - name: Install mariadb client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mariadb-client

      - name: Seed fresh-install schema into dev DB
        run: |
          mariadb -h 127.0.0.1 -P 3306 -uroot -plint dev < sql/schema.sql

      # Atlas's default versioned format treats the leading "NNN_" as
      # the version. atlas.sum is regenerated each run (we don't commit
      # it — see .gitignore).
      - name: Hash migrations
        run: atlas migrate hash --dir file://sql/patches

      - name: Determine baseline version from base branch
        id: baseline
        run: |
          version=$(git ls-tree --name-only "origin/${{ github.base_ref }}" sql/patches/ \
            | grep '\.sql$' \
            | sed 's|^sql/patches/||; s|\.sql$||' \
            | sort \
            | tail -1)
          if [ -z "$version" ]; then
            echo "No patches on origin/${{ github.base_ref }}; aborting" >&2
            exit 1
          fi
          echo "Baseline at: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Apply new patches on top of baseline
        run: |
          atlas migrate apply \
            --dir file://sql/patches \
            --url "mariadb://root:lint@127.0.0.1:3306/dev" \
            --baseline "${{ steps.baseline.outputs.version }}"

      - name: Validate integrity
        run: atlas migrate validate --dir file://sql/patches
